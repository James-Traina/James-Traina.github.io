{{- $url := .Destination -}}
{{- $isPDF := strings.HasSuffix $url ".pdf" -}}
{{- $isExternal := or (strings.HasPrefix $url "http") (strings.HasPrefix $url "//") -}}
<a href="{{ $url }}"
  {{- if or $isPDF $isExternal }} target="_blank" rel="noopener noreferrer"{{ end -}}
>{{ .Text }}</a>
{{- /* PDFs and external links open in new tabs */ -}}
