<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- assign page_title = site.title -%}
  {%- if page.title and page.url != "/" %}{% assign page_title = page.title | append: " · " | append: site.title %}{% endif -%}
  <title>{{ page_title }}</title>
  <meta name="description" content="{{ page.summary | default: site.description }}">
  <meta name="author" content="{{ site.title }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{{ page_title }}">
  <meta property="og:description" content="{{ page.summary | default: site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ '/assets/picture.jpg' | absolute_url }}">
  <meta property="og:image:alt" content="{{ site.title }}">
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
