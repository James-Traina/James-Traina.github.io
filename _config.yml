title: James Traina
description: "James Traina — Assistant Professor of Finance, NYU Stern Abu Dhabi. Research on markups, market power, and firm behavior."
url: "https://james-traina.github.io"

permalink: pretty   # trailing-slash URLs; 404.html opts out via its own permalink
markdown: kramdown

collections:
  papers:
    output: true
    permalink: /papers/:name/
  courses:
    output: false

defaults:
  - scope:
      type: papers
    values:
      layout: single

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - docs
  - CLAUDE.md
  - README.md
