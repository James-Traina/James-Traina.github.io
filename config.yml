    title: James Traina
    subtitle: "I am an Assistant Professor of Finance at NYU Stern Abu Dhabi. I study how firms set prices and wages -- and what happens when they have the power to distort both. My research uses tools from corporate finance and industrial organization to examine markups, markdowns, and the structural underpinnings of investment, pricing, and financing."
